<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --fg: #0F172A;
            --accent: #10B981;
            --muted: #64748B;
            --border: #E2E8F0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }
        @keyframes scan {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(280px); opacity: 0; }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, var(--accent), transparent);
            box-shadow: 0 0 15px var(--accent);
            animation: scan 2s infinite linear;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(16, 185, 129, 0.2);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="p-6 h-screen overflow-hidden flex flex-col relative">
    <!-- Main Image -->
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=1000" class="w-full h-full object-cover grayscale-[0.2]" alt="Uploaded meal">
        <div class="absolute inset-0 bg-black/30"></div>
    </div>

    <!-- Scanning UI -->
    <div class="relative z-10 flex-1 flex flex-col items-center justify-center">
        <!-- Bounding Box -->
        <div class="w-72 h-72 border-2 border-white/40 rounded-3xl relative overflow-hidden backdrop-blur-[2px]">
            <div class="scan-line absolute w-full top-0"></div>
            <!-- Corners -->
            <div class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-[#10B981]"></div>
            <div class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-[#10B981]"></div>
            <div class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-[#10B981]"></div>
            <div class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-[#10B981]"></div>
        </div>
        <div class="mt-8 bg-black/60 backdrop-blur-xl px-6 py-3 rounded-full border border-white/10 flex items-center gap-4 animate-float">
            <div class="spinner"></div>
            <div>
                <p class="text-sm font-bold uppercase tracking-widest text-[#10B981]">Vision Active</p>
                <p class="text-[10px] text-white/60 font-medium">Analyzing contents...</p>
            </div>
        </div>
    </div>

    <!-- Glassmorphism Bottom Card -->
    <div class="relative z-10 bg-white/10 backdrop-blur-2xl border border-white/20 rounded-[32px] p-8 mb-4">
        <div class="flex items-start justify-between mb-6">
            <div>
                <h3 class="text-xl font-bold mb-1">Processing Bowl</h3>
                <p class="text-sm text-white/60">Estimated weight: <span class="text-white font-mono">420g</span></p>
            </div>
            <div class="bg-[#10B981] p-2 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="m4.2 4.2 2.8 2.8"/><path d="M2 12h4"/><path d="m4.2 19.8 2.8-2.8"/><path d="M12 22v-4"/><path d="m19.8 19.8-2.8-2.8"/><path d="M22 12h-4"/><path d="m19.8 4.2-2.8 2.8"/></svg>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 border border-white/10 p-4 rounded-2xl">
                <p class="text-[10px] uppercase font-bold text-white/40 mb-1">Confidence</p>
                <p class="text-lg font-bold text-[#10B981]">98.4%</p>
            </div>
            <div class="bg-white/5 border border-white/10 p-4 rounded-2xl">
                <p class="text-[10px] uppercase font-bold text-white/40 mb-1">VLM Model</p>
                <p class="text-lg font-bold text-white">Gemini 1.5</p>
            </div>
        </div>
    </div>
</body>
</html>
