
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroVision MVP - High Fidelity Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0F172A; color: #fff; }
        .iphone-frame {
            width: 375px;
            height: 812px;
            background: #fff;
            border-radius: 40px;
            border: 12px solid #1E293B;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
        }
        .iphone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 30px;
            background: #1E293B;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 50;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [currentScreen, setCurrentScreen] = useState('screens/01-dashboard.html');

            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.data === 'start-scan') {
                        setCurrentScreen('screens/02-scanning.html');
                        setTimeout(() => {
                            setCurrentScreen('screens/03-review.html');
                        }, 3500);
                    } else if (event.data === 'log-complete') {
                        setCurrentScreen('screens/01-dashboard.html');
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            return (
                <div className="min-h-screen p-12 flex flex-col items-center">
                    <header className="w-full max-w-6xl mb-16 text-center">
                        <div className="inline-block bg-emerald-500/10 border border-emerald-500/20 px-4 py-1.5 rounded-full mb-6">
                            <span className="text-emerald-400 text-xs font-bold uppercase tracking-widest">MacroVision Prototype v1.0</span>
                        </div>
                        <h1 className="text-5xl font-bold mb-4 tracking-tight">Camera-First Calorie MVP</h1>
                        <p className="text-slate-400 text-lg max-w-2xl mx-auto">High-fidelity implementation of the MacroVision scan-to-track flow. Built with a Strict Utility aesthetic.</p>
                    </header>

                    {/* Gallery View */}
                    <section className="w-full max-w-7xl mb-24">
                        <div className="flex items-center justify-between mb-8 border-b border-slate-800 pb-4">
                            <h2 className="text-2xl font-bold">Gallery View</h2>
                            <p className="text-slate-500 font-medium">All states side-by-side</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                            <div className="flex flex-col items-center gap-6">
                                <p className="text-sm font-bold text-slate-500 uppercase tracking-widest">01 Dashboard</p>
                                <div className="iphone-frame scale-90 origin-top">
                                    <div className="iphone-notch"></div>
                                    <iframe src="screens/01-dashboard.html" />
                                </div>
                            </div>
                            <div className="flex flex-col items-center gap-6">
                                <p className="text-sm font-bold text-slate-500 uppercase tracking-widest">02 Scanning</p>
                                <div className="iphone-frame scale-90 origin-top">
                                    <div className="iphone-notch"></div>
                                    <iframe src="screens/02-scanning.html" />
                                </div>
                            </div>
                            <div className="flex flex-col items-center gap-6">
                                <p className="text-sm font-bold text-slate-500 uppercase tracking-widest">03 Review</p>
                                <div className="iphone-frame scale-90 origin-top">
                                    <div className="iphone-notch"></div>
                                    <iframe src="screens/03-review.html" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Interactive Prototype */}
                    <section className="w-full max-w-2xl flex flex-col items-center">
                        <div className="w-full flex items-center justify-between mb-8 border-b border-slate-800 pb-4">
                            <h2 className="text-2xl font-bold">Interactive Prototype</h2>
                            <button 
                                onClick={() => setCurrentScreen('screens/01-dashboard.html')}
                                className="text-xs font-bold uppercase tracking-widest text-emerald-400 hover:text-emerald-300 transition-colors"
                            >
                                Reset Flow
                            </button>
                        </div>
                        <div className="iphone-frame">
                            <div className="iphone-notch"></div>
                            <iframe src={currentScreen} key={currentScreen} />
                        </div>
                        <div className="mt-12 text-center text-slate-500 text-sm max-w-sm">
                            <p className="mb-2 font-bold text-slate-400">Instructions</p>
                            <p>Tap the <span className="text-emerald-400 font-bold">Emerald Button</span> in the camera viewfinder to trigger the AI scanning flow.</p>
                        </div>
                    </section>

                    <footer className="mt-32 text-slate-600 text-xs font-medium uppercase tracking-widest">
                        MacroVision &copy; 2026 • Performance Data Density • Strict Utility UI
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
